<div class="pointer-events-none fixed right-4 top-20 z-[70] flex w-full max-w-sm flex-col gap-2">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto rounded-lg border px-4 py-3 text-sm shadow-md"
      [class.border-[#2a2a1a]="toast.type === 'info'"
      [class.bg-[#1a1a1a]="toast.type === 'info'"
      [class.text-[#F0EDE4]="toast.type === 'info'"
      [class.border-[#2e4a2c]="toast.type === 'success'"
      [class.bg-[#172715]="toast.type === 'success'"
      [class.text-[#cdeac8]="toast.type === 'success'"
      [class.border-[#5f2222]="toast.type === 'error'"
      [class.bg-[#2d1515]="toast.type === 'error'"
      [class.text-[#f8c7c7]="toast.type === 'error'"
    >
      <div class="flex items-start justify-between gap-3">
        <span>{{ toast.text }}</span>
        <button
          type="button"
          class="text-xs opacity-80 hover:opacity-100"
          (click)="toastService.dismiss(toast.id)"
        >
          ✕
        </button>
      </div>
    </div>
  }
</div>
