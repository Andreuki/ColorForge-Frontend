<app-page-wrapper>
  <section class="mx-auto max-w-md px-6 py-10">
    <app-section-title title="Iniciar sesión" subtitle="Accede a tu taller de miniaturas" />
    <div class="bg-cf-surface2 border border-gold-subtle rounded-sm p-6 md:p-8">
      <div class="mb-5 space-y-2">
        <div id="google-login-button" class="flex justify-center"></div>
        @if (!googleReady()) {
          <button
            type="button"
            (click)="triggerGooglePrompt()"
            class="w-full border border-[rgba(200,146,42,0.3)] text-cf-parchment-dim font-heading text-[0.72rem] tracking-widest-cf uppercase px-6 py-3 rounded-sm hover:border-cf-gold hover:text-cf-gold active:scale-95 transition-all duration-200"
            [disabled]="googleLoading()"
          >
            @if (googleLoading()) { Cargando Google... } @else { Continuar con Google }
          </button>
        }
      </div>

      <form (submit)="onSubmit(); $event.preventDefault()" novalidate class="space-y-4">
        <div>
          <label for="email" class="font-heading text-[0.72rem] tracking-widest-cf uppercase text-cf-gold block mb-1.5">Correo electrónico</label>
          <input id="email" type="email" [value]="model().email" (input)="onEmailInput($event)" (blur)="touchField('email')" class="bg-cf-surface border border-gold-subtle rounded-sm text-cf-parchment font-body text-base px-4 py-2.5 w-full placeholder:text-cf-parchment-muted focus:outline-none focus:border-cf-gold focus:ring-2 focus:ring-[rgba(200,146,42,0.1)] transition-all duration-200" placeholder="tu@email.com" autocomplete="email" />
          @if (touched().email && emailError()) {
            <span class="text-cf-crimson-light text-xs mt-1 block">{{ emailError() }}</span>
          }
        </div>

        <div>
          <label for="password" class="font-heading text-[0.72rem] tracking-widest-cf uppercase text-cf-gold block mb-1.5">Contraseña</label>
          <input id="password" type="password" [value]="model().password" (input)="onPasswordInput($event)" (blur)="touchField('password')" class="bg-cf-surface border border-gold-subtle rounded-sm text-cf-parchment font-body text-base px-4 py-2.5 w-full placeholder:text-cf-parchment-muted focus:outline-none focus:border-cf-gold focus:ring-2 focus:ring-[rgba(200,146,42,0.1)] transition-all duration-200" placeholder="••••••••" autocomplete="current-password" />
          @if (touched().password && passwordError()) {
            <span class="text-cf-crimson-light text-xs mt-1 block">{{ passwordError() }}</span>
          }
          <a routerLink="/forgot-password" class="mt-2 block font-ui text-[0.72rem] uppercase tracking-wide-cf text-cf-parchment-dim hover:text-cf-gold">¿Olvidaste tu contraseña?</a>
        </div>

        @if (errorMessage()) {
          <div class="border border-cf-crimson bg-cf-surface p-3 text-cf-parchment text-sm">{{ errorMessage() }}</div>
        }

        <button type="submit" class="w-full bg-gradient-to-br from-cf-gold to-cf-gold-dim text-cf-black font-heading text-[0.75rem] tracking-widest-cf uppercase px-6 py-3 rounded-sm shadow-gold-md hover:-translate-y-0.5 hover:shadow-gold-lg active:scale-95 transition-all duration-200 disabled:opacity-60" [disabled]="loading() || formInvalid()">
          @if (loading()) { Iniciando... } @else { Iniciar sesión }
        </button>
      </form>

      <p class="font-body text-cf-parchment-dim text-sm text-center mt-5">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-cf-gold hover:text-cf-gold-light transition-colors">Regístrate aquí</a>
      </p>
    </div>
  </section>
</app-page-wrapper>
