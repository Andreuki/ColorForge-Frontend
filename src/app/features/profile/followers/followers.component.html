<section class="mx-auto min-h-screen max-w-4xl px-6 py-10 text-cf-parchment bg-cf-black">
  <div class="rounded-sm bg-cf-surface2 border border-gold-subtle p-6 shadow-card">
    <h1 class="text-2xl font-heading uppercase tracking-widest-cf text-cf-gold mb-6">Seguidores</h1>

    @if (loading()) {
      <p class="text-cf-parchment-muted">Cargando seguidores...</p>
    } @else if (error()) {
      <p class="text-cf-crimson-light">{{ error() }}</p>
    } @else if (followers().length === 0) {
      <p class="text-cf-parchment-muted">Este usuario aún no tiene seguidores.</p>
    } @else {
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        @for (user of followers(); track user._id) {
          <a [routerLink]="['/user', user._id]" class="flex items-center gap-3 rounded-sm bg-cf-surface border border-gold-subtle p-3 hover:border-cf-gold hover:shadow-gold-sm transition-all">
            <img [src]="toAbsoluteUrl(user.avatar)" class="h-10 w-10 rounded-full object-cover" [alt]="user.username || user.name" />
            <span class="font-ui text-cf-parchment">{{ user.username || user.name }}</span>
          </a>
        }
      </div>
    }
  </div>
</section>
